# ══════════════════════════════════════════════════════
#  ANON·BOARDS — Nginx Production Configuration
#  Save as: /etc/nginx/sites-available/anonboards
#  Enable: ln -s /etc/nginx/sites-available/anonboards /etc/nginx/sites-enabled/
#  Test:   nginx -t
#  Reload: systemctl reload nginx
# ══════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name anonboards.example.com www.anonboards.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anonboards.example.com www.anonboards.example.com;

    # ── SSL (update paths after running certbot) ──────────────────────
    # ssl_certificate     /etc/letsencrypt/live/anonboards.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/anonboards.example.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root ──────────────────────────────────────────────────────────
    root /var/www/anonboards;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/wasm image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options               "SAMEORIGIN"    always;
    add_header X-Content-Type-Options        "nosniff"       always;
    add_header X-XSS-Protection             "1; mode=block" always;
    add_header Referrer-Policy              "no-referrer"   always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; worker-src blob:;" always;

    # ── Serve index.html for single-page navigation ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────
    location ~* \.(js|css|wasm|woff2?|ttf|otf|svg|png|jpg|ico|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Specific: cache manifest & SW with short TTL ──────────────────
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/manifest+json";
    }

    location = /sw.js {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── robots.txt ───────────────────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ── Block hidden files (.git, .env, etc.) ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error pages ───────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /offline.html;
}
